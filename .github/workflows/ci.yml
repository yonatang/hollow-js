name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - '!lib/node_modules/**'
      - '!lib/dist/**'
  pull_request:
    paths:
      - 'lib/**'
      - '!lib/node_modules/**'
      - '!lib/dist/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build library
        run: pnpm build
