name: Publish Release

on:
  push:
    branches:
      - main
    paths:
      - 'lib/package.json'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: version_check
        run: |
          if git diff HEAD~1 HEAD -- lib/package.json | grep -q '"version"'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed, proceeding with publish"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged, skipping publish"
          fi

      - name: Setup pnpm
        if: steps.version_check.outputs.changed == 'true'
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js 24
        if: steps.version_check.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.version_check.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run tests
        if: steps.version_check.outputs.changed == 'true'
        run: pnpm test

      - name: Build library
        if: steps.version_check.outputs.changed == 'true'
        run: pnpm build

      - name: Publish to npm
        if: steps.version_check.outputs.changed == 'true'
        run: pnpm exec changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get published version
        if: steps.version_check.outputs.changed == 'true'
        id: version
        run: echo "version=$(node -p "require('./lib/package.json').version")" >> $GITHUB_OUTPUT

      - name: Create git tag
        if: steps.version_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: v${{ steps.version.outputs.version }}
          body: |
            Release v${{ steps.version.outputs.version }}

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/lib/CHANGELOG.md) for details.
          draft: false
          prerelease: false

      - name: Report success
        if: steps.version_check.outputs.changed == 'true'
        run: |
          echo "✅ Published @yonatang/hollow-js@${{ steps.version.outputs.version }}"
          echo "📦 npm: https://www.npmjs.com/package/@yonatang/hollow-js"
          echo "🏷️  Tag: v${{ steps.version.outputs.version }}"
